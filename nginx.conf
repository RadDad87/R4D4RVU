server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Open the radar pre-configured for the local SDR feed.
    location = / {
        return 302 /index.html?source=sdr&sdr=/data/aircraft.json;
    }

    # Same-origin proxy to readsb's JSON so the browser can read it offline.
    location /data/ {
        proxy_pass http://readsb:8080/data/;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }
}
